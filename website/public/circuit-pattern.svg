<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g stroke="#00ffe7" fill="none" stroke-width="1.2" opacity="0.45">
    <!-- Left vertical trunk -->
    <polyline points="120,0 120,180 120,400"/>
    <polyline points="120,400 120,600 120,850"/>
    <polyline points="120,850 120,1050 120,1200"/>

    <!-- Left branches going right -->
    <polyline points="120,80 200,80 200,160 280,160"/>
    <polyline points="120,180 180,180 180,260 260,260 260,340"/>
    <polyline points="120,320 200,320"/>
    <polyline points="120,460 160,460 160,520 240,520"/>
    <polyline points="120,600 200,600 200,680 320,680"/>
    <polyline points="120,740 180,740 180,680"/>
    <polyline points="120,850 220,850 220,920 300,920"/>
    <polyline points="120,960 200,960 200,1040"/>
    <polyline points="120,1080 180,1080 180,1140 260,1140"/>

    <!-- Center vertical lines -->
    <polyline points="320,0 320,120 320,280"/>
    <polyline points="320,280 320,440 320,600"/>
    <polyline points="320,600 320,760 320,920"/>
    <polyline points="320,920 320,1060 320,1200"/>
    <polyline points="400,100 400,300 400,500"/>
    <polyline points="400,500 400,700 400,900"/>
    <polyline points="400,900 400,1100 400,1200"/>

    <!-- Center horizontal connections -->
    <polyline points="280,160 380,160 380,240"/>
    <polyline points="260,340 340,340 340,280"/>
    <polyline points="320,440 420,440 420,380"/>
    <polyline points="240,520 340,520 340,600"/>
    <polyline points="320,680 420,680"/>
    <polyline points="300,920 400,920 400,900"/>
    <polyline points="320,1060 400,1060 400,1100"/>

    <!-- Right vertical trunk -->
    <polyline points="560,0 560,200 560,400"/>
    <polyline points="560,400 560,600 560,800"/>
    <polyline points="560,800 560,1000 560,1200"/>
    <polyline points="680,60 680,240 680,420"/>
    <polyline points="680,420 680,600 680,800"/>
    <polyline points="680,800 680,1000 680,1200"/>

    <!-- Right branches going left -->
    <polyline points="680,120 620,120 620,200 560,200"/>
    <polyline points="680,300 600,300 600,400"/>
    <polyline points="560,340 480,340 480,280 400,280"/>
    <polyline points="680,480 620,480 620,560 560,560"/>
    <polyline points="560,640 500,640 500,700 420,700"/>
    <polyline points="680,720 600,720 600,800"/>
    <polyline points="560,880 500,880 500,960 420,960"/>
    <polyline points="680,920 620,920 620,1000 560,1000"/>
    <polyline points="560,1100 500,1100 500,1160 440,1160"/>
    <polyline points="680,1080 620,1080 620,1140"/>

    <!-- Right branches going further right -->
    <polyline points="680,180 740,180 740,120 780,120"/>
    <polyline points="680,360 740,360"/>
    <polyline points="680,540 760,540 760,480"/>
    <polyline points="680,660 740,660 740,720"/>
    <polyline points="680,840 740,840 740,780"/>
    <polyline points="680,1040 760,1040"/>

    <!-- Extra diagonal-free detail lines -->
    <polyline points="200,160 200,240 280,240"/>
    <polyline points="400,300 480,300 480,340"/>
    <polyline points="400,500 460,500 460,560"/>
    <polyline points="400,700 460,700 460,760 520,760"/>
    <polyline points="200,960 280,960 280,1040 340,1040"/>
    <polyline points="500,960 500,1040 560,1040"/>
  </g>

  <!-- Nodes (junction dots) -->
  <g fill="#00ffe7" filter="url(#nodeGlow)">
    <!-- Left side nodes -->
    <circle cx="120" cy="80" r="3.5" opacity="0.7"/>
    <circle cx="120" cy="180" r="4" opacity="0.8"/>
    <circle cx="200" cy="80" r="2.5" opacity="0.6"/>
    <circle cx="280" cy="160" r="3" opacity="0.7"/>
    <circle cx="120" cy="320" r="3" opacity="0.6"/>
    <circle cx="200" cy="320" r="2.5" opacity="0.5"/>
    <circle cx="120" cy="460" r="3.5" opacity="0.7"/>
    <circle cx="240" cy="520" r="3" opacity="0.6"/>
    <circle cx="120" cy="600" r="4" opacity="0.8"/>
    <circle cx="320" cy="680" r="3" opacity="0.7"/>
    <circle cx="120" cy="740" r="2.5" opacity="0.5"/>
    <circle cx="120" cy="850" r="4" opacity="0.8"/>
    <circle cx="300" cy="920" r="3" opacity="0.7"/>
    <circle cx="120" cy="960" r="3" opacity="0.6"/>
    <circle cx="200" cy="1040" r="2.5" opacity="0.5"/>
    <circle cx="120" cy="1080" r="3.5" opacity="0.7"/>
    <circle cx="260" cy="1140" r="3" opacity="0.6"/>

    <!-- Center nodes -->
    <circle cx="320" cy="120" r="3" opacity="0.6"/>
    <circle cx="320" cy="280" r="4" opacity="0.8"/>
    <circle cx="320" cy="440" r="3.5" opacity="0.7"/>
    <circle cx="320" cy="600" r="4" opacity="0.9"/>
    <circle cx="320" cy="920" r="3.5" opacity="0.7"/>
    <circle cx="320" cy="1060" r="3" opacity="0.6"/>
    <circle cx="400" cy="100" r="2.5" opacity="0.5"/>
    <circle cx="400" cy="280" r="3" opacity="0.7"/>
    <circle cx="400" cy="500" r="3.5" opacity="0.7"/>
    <circle cx="400" cy="700" r="3" opacity="0.6"/>
    <circle cx="400" cy="900" r="4" opacity="0.8"/>
    <circle cx="400" cy="1100" r="3" opacity="0.6"/>
    <circle cx="420" cy="440" r="2.5" opacity="0.5"/>
    <circle cx="340" cy="520" r="2.5" opacity="0.5"/>

    <!-- Right side nodes -->
    <circle cx="560" cy="200" r="4" opacity="0.8"/>
    <circle cx="560" cy="340" r="3" opacity="0.6"/>
    <circle cx="560" cy="560" r="3.5" opacity="0.7"/>
    <circle cx="560" cy="640" r="3" opacity="0.7"/>
    <circle cx="560" cy="880" r="4" opacity="0.8"/>
    <circle cx="560" cy="1000" r="3" opacity="0.6"/>
    <circle cx="560" cy="1100" r="3.5" opacity="0.7"/>
    <circle cx="680" cy="120" r="3" opacity="0.6"/>
    <circle cx="680" cy="300" r="3.5" opacity="0.7"/>
    <circle cx="680" cy="480" r="3" opacity="0.6"/>
    <circle cx="680" cy="660" r="2.5" opacity="0.5"/>
    <circle cx="680" cy="720" r="3" opacity="0.7"/>
    <circle cx="680" cy="920" r="4" opacity="0.8"/>
    <circle cx="680" cy="1080" r="3" opacity="0.6"/>
    <circle cx="740" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="740" cy="360" r="2.5" opacity="0.5"/>
    <circle cx="760" cy="540" r="3" opacity="0.6"/>
    <circle cx="740" cy="840" r="2.5" opacity="0.5"/>
    <circle cx="760" cy="1040" r="2.5" opacity="0.5"/>
  </g>

  <!-- Larger glowing accent nodes -->
  <g filter="url(#softGlow)">
    <circle cx="120" cy="600" r="8" fill="#00ffe7" opacity="0.25"/>
    <circle cx="320" cy="280" r="10" fill="#00ffe7" opacity="0.2"/>
    <circle cx="560" cy="200" r="9" fill="#00ffe7" opacity="0.22"/>
    <circle cx="400" cy="900" r="10" fill="#00ffe7" opacity="0.2"/>
    <circle cx="680" cy="920" r="8" fill="#00ffe7" opacity="0.25"/>
    <circle cx="320" cy="600" r="12" fill="#00ffe7" opacity="0.18"/>
    <circle cx="120" cy="850" r="9" fill="#00ffe7" opacity="0.2"/>
    <circle cx="560" cy="880" r="10" fill="#00ffe7" opacity="0.22"/>
    <circle cx="240" cy="520" r="7" fill="#00ffe7" opacity="0.2"/>
    <circle cx="680" cy="480" r="8" fill="#00ffe7" opacity="0.18"/>
  </g>
</svg>
