# Netlify: build Vite output and publish static files from website/dist.
# Troubleshooting: https://answers.netlify.com/t/support-guide-i-ve-deployed-my-site-but-i-still-see-page-not-found/125?utm_source=404page&utm_campaign=community_tracking

[build]
  command = "cd website && npm ci && npm run build"
  publish = "website/dist"

[build.environment]
  NODE_VERSION = "22"

# Leave VITE_BASE_URL unset in Netlify (site root). GitHub Actions sets it only for github.io project URLs.
