# Netlify monorepo: all commands run from /website; static output is /website/dist.
# In the Netlify UI, leave "Base directory" empty (repo root) so this file is used as-is.
# Doc: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "website"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Do not set VITE_BASE_URL here (defaults to "/" for Netlify root).
